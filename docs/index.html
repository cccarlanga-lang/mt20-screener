<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0B0F1A">
  <meta name="description" content="Dashboard operativo Weinstein — Stage 2 + Mansfield RS">
  <title>Weinstein · Dashboard Operativo</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2310B981'/%3E%3Ctext x='50' y='68' font-size='60' font-family='system-ui' font-weight='800' text-anchor='middle' fill='%230B0F1A'%3EW%3C/text%3E%3C/svg%3E">
  <style>
    /* =========================================================
       1. Reset + tokens
       ========================================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-feature-settings: "tnum" 1, "lnum" 1;
      line-height: 1.45;
      color: var(--text-primary);
      background: var(--bg-base);
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
    }
    button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    :root {
      /* Palette */
      --bg-base:       #0B0F1A;
      --bg-elevated:   #111827;
      --bg-hover:      #1A2231;
      --border:        #1F2937;
      --border-strong: #374151;

      --text-primary:   #F9FAFB;
      --text-secondary: #9CA3AF;
      --text-muted:     #6B7280;

      --green:    #10B981;
      --green-bg: rgba(16,185,129,0.12);
      --red:      #EF4444;
      --red-bg:   rgba(239,68,68,0.12);
      --amber:    #F59E0B;
      --amber-bg: rgba(245,158,11,0.12);
      --blue:     #3B82F6;
      --blue-bg:  rgba(59,130,246,0.12);
      --purple:   #8B5CF6;
      --purple-bg:rgba(139,92,246,0.12);

      --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;

      --radius-sm: 6px;
      --radius:    10px;
      --radius-lg: 14px;
    }

    /* =========================================================
       2. Layout
       ========================================================= */
    #app { max-width: 720px; margin: 0 auto; padding: 0 16px 64px; }
    @media (min-width: 900px) {
      #app { max-width: 1100px; padding: 0 24px 64px; }
    }

    /* =========================================================
       3. Header
       ========================================================= */
    header.app-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: linear-gradient(180deg, var(--bg-base) 80%, rgba(11,15,26,0.92) 100%);
      padding: 16px 0 12px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .header-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .header-title h1 {
      font-size: clamp(18px, 4vw, 22px);
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .header-title h1 .accent { color: var(--green); }
    .header-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .header-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    /* =========================================================
       4. Pills, badges, banners
       ========================================================= */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      line-height: 1;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .pill .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    .pill.verde  { color: var(--green);  background: var(--green-bg);  border-color: rgba(16,185,129,0.3); }
    .pill.rojo   { color: var(--red);    background: var(--red-bg);    border-color: rgba(239,68,68,0.3); }
    .pill.amber  { color: var(--amber);  background: var(--amber-bg);  border-color: rgba(245,158,11,0.3); }
    .pill.blue   { color: var(--blue);   background: var(--blue-bg);   border-color: rgba(59,130,246,0.3); }
    .pill.purple { color: var(--purple); background: var(--purple-bg); border-color: rgba(139,92,246,0.3); }
    .pill.muted  { color: var(--text-secondary); background: var(--bg-elevated); border-color: var(--border); }

    .pill.pulse .dot { animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.9); }
    }

    /* Big banner */
    .banner {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 14px 16px;
      border-radius: var(--radius);
      border-left: 4px solid;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .banner-icon { font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 1px; }
    .banner-body { flex: 1; }
    .banner-title { font-weight: 700; margin-bottom: 2px; }
    .banner-text  { color: var(--text-secondary); font-size: 13px; }

    .banner.rojo  { background: var(--red-bg);   border-color: var(--red);   }
    .banner.amber { background: var(--amber-bg); border-color: var(--amber); }
    .banner.blue  { background: var(--blue-bg);  border-color: var(--blue);  }

    /* =========================================================
       5. Panels
       ========================================================= */
    section.panel {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .panel-header h2 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }
    .panel-body { padding: 8px 0; }
    .panel-empty {
      padding: 24px 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }
    .panel-empty .empty-icon {
      display: block;
      font-size: 28px;
      margin-bottom: 8px;
      opacity: 0.5;
    }
    .panel-empty strong { color: var(--text-secondary); }

    /* =========================================================
       6. Rows / cards inside panels
       ========================================================= */
    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .row:last-child { border-bottom: 0; }

    .row-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }
    .row-symbol {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }
    .row-symbol .sym {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .row-symbol .name {
      font-size: 12px;
      color: var(--text-muted);
    }
    .row-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .row-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px 12px;
      padding-top: 4px;
    }
    @media (min-width: 600px) {
      .row-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .kpi { display: flex; flex-direction: column; gap: 2px; }
    .kpi-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .kpi-value {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .kpi-value.green { color: var(--green); }
    .kpi-value.red   { color: var(--red); }
    .kpi-value.amber { color: var(--amber); }

    .row-note {
      font-size: 12px;
      color: var(--text-secondary);
      padding: 6px 10px;
      background: rgba(255,255,255,0.03);
      border-radius: var(--radius-sm);
      border-left: 2px solid var(--border-strong);
    }
    .row-note.urgent { border-color: var(--red); color: var(--text-primary); }
    .row-note.warn   { border-color: var(--amber); color: var(--text-primary); }
    .row-note.success{ border-color: var(--green); color: var(--text-primary); }

    /* Action card variants (left-border emphasis) */
    .row.action {
      border-left: 4px solid transparent;
    }
    .row.action.urgent  { border-left-color: var(--red);    background: linear-gradient(90deg, var(--red-bg) 0%, transparent 30%); }
    .row.action.warn    { border-left-color: var(--amber);  background: linear-gradient(90deg, var(--amber-bg) 0%, transparent 30%); }
    .row.action.success { border-left-color: var(--purple); background: linear-gradient(90deg, var(--purple-bg) 0%, transparent 30%); }

    /* =========================================================
       7. Stats strip
       ========================================================= */
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      background: var(--border);
    }
    @media (min-width: 600px) {
      .stats { grid-template-columns: repeat(4, 1fr); }
    }
    .stat {
      background: var(--bg-elevated);
      padding: 12px 16px;
    }
    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .stat-value {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 700;
    }
    .stat-value.green { color: var(--green); }
    .stat-value.amber { color: var(--amber); }
    .stat-value.red   { color: var(--red); }

    /* =========================================================
       8. Section dividers inside panels
       ========================================================= */
    h3.section-divider {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 8px 16px 4px;
      padding-top: 6px;
    }

    /* =========================================================
       9. Footer
       ========================================================= */
    footer.app-footer {
      margin-top: 32px;
      padding: 24px 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 11px;
      line-height: 1.7;
      border-top: 1px solid var(--border);
    }
    footer.app-footer strong { color: var(--text-secondary); }

    /* =========================================================
       10. Loading / error fullscreen
       ========================================================= */
    .fullscreen-state {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      gap: 12px;
    }
    .fullscreen-state .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fullscreen-state h2 { font-size: 18px; margin-bottom: 4px; }
    .fullscreen-state p  { color: var(--text-secondary); font-size: 14px; max-width: 360px; }
    .fullscreen-state code {
      font-family: var(--mono);
      background: var(--bg-elevated);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }

    /* =========================================================
       11. Portfolio Editor Modal
       ========================================================= */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal {
      background: var(--bg-elevated);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 560px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .modal-header h2 { font-size: 16px; font-weight: 700; }
    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .modal-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-hover);
      color: var(--text-primary);
      transition: background 0.15s;
    }
    .btn:hover { background: var(--border); }
    .btn.primary { background: var(--green); color: #000; border-color: var(--green); }
    .btn.primary:hover { background: #0ea472; }
    .btn.danger { color: var(--red); border-color: rgba(239,68,68,0.3); }
    .btn.danger:hover { background: var(--red-bg); }
    .btn.small { padding: 4px 8px; font-size: 12px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .editor-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
    }
    .editor-field label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .editor-input {
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      color: var(--text-primary);
      font-family: var(--mono);
      font-size: 14px;
    }
    .editor-input:focus { outline: none; border-color: var(--green); }
    .editor-input::placeholder { color: var(--text-muted); }

    .editor-pos {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      background: var(--bg-base);
    }
    .editor-pos-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .editor-pos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .editor-pos-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .editor-divider {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }
    .editor-status {
      font-size: 13px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 12px;
    }
    .editor-status.ok { background: var(--green-bg); color: var(--green); }
    .editor-status.err { background: var(--red-bg); color: var(--red); }
    .editor-status.loading { background: var(--blue-bg); color: var(--blue); }

    .btn-editor-header {
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 600;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-editor-header:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--border-strong);
    }
  </style>
</head>
<body>

  <main id="app">
    <div class="fullscreen-state" id="bootstrap">
      <div class="spinner"></div>
      <h2>Cargando datos…</h2>
      <p>Leyendo el último cierre semanal y la cartera actual.</p>
    </div>
  </main>

  <div id="editor-root"></div>

  <script>
  /* ============================================================
     APP — Weinstein Operativo Dashboard
     Vanilla JS. Sin dependencias. GitHub Pages compatible.
     ============================================================ */

  const DATA_URL   = "data.json";
  const STATUS_URL = "update_status.json";

  /* -----------------------------------------------------------
     Helpers de formato
     ----------------------------------------------------------- */
  const fmtPrice = (v) => {
    if (v == null || isNaN(v)) return "—";
    return v.toFixed(2);
  };
  const fmtPct = (v, withSign = true) => {
    if (v == null || isNaN(v)) return "—";
    const sign = withSign && v > 0 ? "+" : "";
    return `${sign}${v.toFixed(2)}%`;
  };
  const fmtR = (v) => {
    if (v == null || isNaN(v)) return "—";
    const sign = v > 0 ? "+" : "";
    return `${sign}${v.toFixed(2)}R`;
  };
  const fmtMS = (v) => {
    if (v == null || isNaN(v)) return "—";
    const sign = v > 0 ? "+" : "";
    return `${sign}${v.toFixed(2)}`;
  };
  const fmtMoney = (v) => {
    if (v == null || isNaN(v)) return "—";
    return new Intl.NumberFormat("es-ES", {
      style: "currency", currency: "USD", maximumFractionDigits: 0,
    }).format(v);
  };
  const colorClassR = (v) => {
    if (v == null || isNaN(v)) return "";
    if (v > 0) return "green";
    if (v < 0) return "red";
    return "";
  };

  const timeAgo = (iso) => {
    if (!iso) return "desconocido";
    const then = new Date(iso);
    if (isNaN(then.getTime())) return "desconocido";
    const diffSec = Math.floor((Date.now() - then.getTime()) / 1000);
    if (diffSec < 60)    return "hace segundos";
    if (diffSec < 3600)  return `hace ${Math.floor(diffSec/60)} min`;
    if (diffSec < 86400) return `hace ${Math.floor(diffSec/3600)} h`;
    const days = Math.floor(diffSec/86400);
    return days === 1 ? "hace 1 día" : `hace ${days} días`;
  };

  const fmtDate = (iso) => {
    if (!iso) return "—";
    try {
      return new Date(iso).toLocaleDateString("es-ES", {
        day: "2-digit", month: "short", year: "numeric",
      });
    } catch { return iso; }
  };

  const escapeHtml = (s) => String(s ?? "").replace(/[&<>"']/g, (c) =>
    ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;", "'":"&#39;" }[c])
  );

  /* -----------------------------------------------------------
     Renderers — devuelven HTML strings
     ----------------------------------------------------------- */

  function renderHeader(data, status) {
    const mt = data?.market_timing || {};
    const isRojo = mt.status === "ROJO";

    let statusPill;
    switch ((status?.status || "ERROR").toUpperCase()) {
      case "OK":
        statusPill = `<span class="pill verde"><span class="dot"></span>Datos al día</span>`;
        break;
      case "EJECUTANDO":
        statusPill = `<span class="pill blue pulse"><span class="dot"></span>Actualizando…</span>`;
        break;
      case "PENDIENTE":
        statusPill = `<span class="pill amber"><span class="dot"></span>Actualización atrasada</span>`;
        break;
      case "ERROR":
      default:
        statusPill = `<span class="pill rojo"><span class="dot"></span>Error de actualización</span>`;
    }

    const mtPill = isRojo
      ? `<span class="pill rojo"><span class="dot"></span>Market Timing · ROJO</span>`
      : `<span class="pill verde"><span class="dot"></span>Market Timing · VERDE</span>`;

    const subtitle = status?.last_run_at
      ? `Última actualización: <strong>${escapeHtml(timeAgo(status.last_run_at))}</strong> · Datos del ${escapeHtml(fmtDate(data?.meta?.data_date))}`
      : `Sin información de actualización`;

    return `
      <header class="app-header">
        <div class="header-title">
          <div>
            <h1>Weinstein <span class="accent">·</span> Operativo</h1>
            <div class="header-subtitle">${subtitle}</div>
          </div>
          <button class="btn-editor-header" onclick="editorOpen()">Gestionar Cartera</button>
        </div>
        <div class="header-pills">
          ${statusPill}
          ${mtPill}
        </div>
      </header>
    `;
  }

  function renderUpdateBanner(status) {
    const s = (status?.status || "ERROR").toUpperCase();
    if (s === "OK") return "";

    if (s === "EJECUTANDO") {
      return `
        <div class="banner blue">
          <div class="banner-icon">⏳</div>
          <div class="banner-body">
            <div class="banner-title">Pipeline en ejecución</div>
            <div class="banner-text">Los datos de esta página pueden estar desactualizados unos minutos.</div>
          </div>
        </div>`;
    }
    if (s === "PENDIENTE") {
      return `
        <div class="banner amber">
          <div class="banner-icon">⚠️</div>
          <div class="banner-body">
            <div class="banner-title">Actualización atrasada</div>
            <div class="banner-text">El pipeline debería haber corrido el ${escapeHtml(fmtDate(status?.next_run_at))}. Verifica GitHub Actions.</div>
          </div>
        </div>`;
    }
    // ERROR
    const errs = (status?.errors || []).slice(0, 2).map(escapeHtml).join(" · ") || "Sin detalle";
    const link = status?.log_url
      ? ` <a href="${escapeHtml(status.log_url)}" target="_blank" rel="noopener">Ver log</a>`
      : "";
    return `
      <div class="banner rojo">
        <div class="banner-icon">🛑</div>
        <div class="banner-body">
          <div class="banner-title">Error en la última actualización</div>
          <div class="banner-text">No te fíes de los datos. ${errs}.${link}</div>
        </div>
      </div>`;
  }

  function renderMTBanner(data) {
    const mt = data?.market_timing || {};
    if (mt.status !== "ROJO") return "";
    return `
      <div class="banner rojo">
        <div class="banner-icon">🔴</div>
        <div class="banner-body">
          <div class="banner-title">Market Timing en ROJO — No se abren nuevas compras</div>
          <div class="banner-text">

  /* -----------------------------------------------------------
     Bootstrap
     ----------------------------------------------------------- */
  async function fetchJSON(url) {
    const resp = await fetch(`${url}?t=${Date.now()}`, { cache: "no-store" });
    if (!resp.ok) throw new Error(`${url}: ${resp.status}`);
    return await resp.json();
  }

  async function bootstrap() {
    let data, status;

    try {
      [data, status] = await Promise.all([
        fetchJSON(DATA_URL),
        fetchJSON(STATUS_URL).catch(() => ({
          status: "ERROR",
          errors: ["update_status.json no encontrado"],
        })),
      ]);
    } catch (err) {
      console.error(err);
      renderFatalError(`Error cargando datos: ${err.message}`);
      return;
    }

    // Heurística cliente: si last_run_at + 8 días < now → PENDIENTE
    if (status?.status === "OK" && status.last_run_at) {
      const ageDays = (Date.now() - new Date(status.last_run_at).getTime()) / 86400000;
      if (ageDays > 8) status = { ...status, status: "PENDIENTE" };
    }

    render(data, status);
  }

  /* ============================================================
     PORTFOLIO EDITOR — Gestión visual de portfolio_manual.json
     Usa GitHub API para leer/escribir directamente desde el navegador.
     El token (PAT) se guarda en localStorage, nunca sale de tu máquina.
     ============================================================ */

  const GITHUB_REPO    = "cccarlanga-lang/mt20-screener";
  const PORTFOLIO_FILE = "portfolio_manual.json";
  const GITHUB_API     = `https://api.github.com/repos/${GITHUB_REPO}/contents/${PORTFOLIO_FILE}`;

  const editorGetToken   = () => localStorage.getItem("gh_pat") || "";
  const editorSetToken   = (t) => localStorage.setItem("gh_pat", t);
  const editorClearToken = () => localStorage.removeItem("gh_pat");

  let editorState = {
    open: false,
    loading: false,
    portfolio: null,
    sha: null,
    status: null,
    dirty: false,
  };

  /* ---------- GitHub API ---------- */

  async function editorFetchPortfolio() {
    const token = editorGetToken();
    if (!token) return null;
    const resp = await fetch(GITHUB_API, {
      headers: {
        Authorization: `Bearer ${token}`,
        Accept: "application/vnd.github.v3+json",
      },
    });
    if (resp.status === 401 || resp.status === 403)
      throw new Error("Token sin permisos o expirado. Reconecta.");
    if (!resp.ok) throw new Error(`GitHub API: ${resp.status}`);
    const json = await resp.json();
    const raw  = atob(json.content.replace(/\n/g, ""));
    const text = decodeURIComponent(escape(raw));
    return { data: JSON.parse(text), sha: json.sha };
  }

  async function editorSavePortfolio(portfolio, sha) {
    const token = editorGetToken();
    if (!token) throw new Error("No hay token configurado");
    const text    = JSON.stringify(portfolio, null, 2) + "\n";
    const content = btoa(unescape(encodeURIComponent(text)));
    const resp = await fetch(GITHUB_API, {
      method: "PUT",
      headers: {
        Authorization: `Bearer ${token}`,
        Accept: "application/vnd.github.v3+json",
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        message: "portfolio: update from dashboard editor",
        content,
        sha,
      }),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.message || `GitHub API: ${resp.status}`);
    }
    return (await resp.json()).content.sha;
  }

  async function editorTriggerWorkflow() {
    const token = editorGetToken();
    if (!token) return;
    await fetch(
      `https://api.github.com/repos/${GITHUB_REPO}/actions/workflows/update_dashboard.yml/dispatches`,
      {
        method: "POST",
        headers: {
          Authorization: `Bearer ${token}`,
          Accept: "application/vnd.github.v3+json",
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ ref: "main" }),
      }
    );
  }

  /* ---------- Editor lifecycle ---------- */

  function editorOpen() {
    editorState.open = true;
    editorState.status = { type: "loading", msg: "Cargando cartera desde GitHub…" };
    editorRender();

    editorFetchPortfolio()
      .then((result) => {
        if (result) {
          editorState.portfolio = result.data;
          editorState.sha = result.sha;
          editorState.status = null;
          editorState.dirty = false;
        }
        editorRender();
      })
      .catch((err) => {
        editorState.status = { type: "err", msg: err.message };
        editorRender();
      });
  }

  function editorClose() {
    if (editorState.dirty && !confirm("Hay cambios sin guardar. ¿Cerrar?")) return;
    editorState = { open: false, loading: false, portfolio: null, sha: null, status: null, dirty: false };
    editorRender();
  }

  function editorDisconnect() {
    if (!confirm("¿Borrar token de GitHub de este navegador?")) return;
    editorClearToken();
    editorState.portfolio = null;
    editorState.sha = null;
    editorState.dirty = false;
    editorRender();
  }

  /* ---------- Editor rendering ---------- */

  function editorRender() {
    const root = document.getElementById("editor-root");
    if (!editorState.open) { root.innerHTML = ""; return; }

    const token = editorGetToken();
    if (!token) {
      root.innerHTML = editorModalShell(editorRenderTokenSetup());

    const st = editorState.status;
    const statusHtml = st
      ? `<div class="editor-status ${st.type === "ok" ? "ok" : st.type === "err" ? "err" : "loading"}">${escapeHtml(st.msg)}</div>`
      : "";

    if (!editorState.portfolio) {
      root.innerHTML = editorModalShell(statusHtml || '<div class="editor-status loading">Cargando…</div>');

    }

    const p = editorState.portfolio;
    const positions = p.positions || [];
    let body = statusHtml;

    // Capital total

    // Existing positions

    } else {
      positions.forEach((pos, i) => {
        const partials = pos.partials_done || [];

        const has3R = partials.includes("3R");
        body += `
          <div class="editor-pos">

              <button class="btn danger small" onclick="editorDeletePos(${i})">Eliminar</button>
            </div>

              <button class="btn small ${has3R ? "primary" : ""}"

            </div>
          </div>`;
      });
    }

    // Add new position form
    body += `
      <hr class="editor-divider">
      <div style="font-weight:700;margin-bottom:8px;font-size:13px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.04em;">
        Añadir posición
      </div>
      <div class="editor-pos-grid">
        <div class="editor-field">
          <label>Ticker</label>
          <input type="text" class="editor-input" id="ed-new-ticker"
                 placeholder="MSFT" style="text-transform:uppercase">
        </div>
        <div class="editor-field">
          <label>Precio compra</label>
          <input type="number" class="editor-input" id="ed-new-price"
                 placeholder="412.50" step="0.01">
        </div>
      </div>
      <div class="editor-pos-grid">
        <div class="editor-field">
          <label>Fecha compra</label>
          <input type="date" class="editor-input" id="ed-new-date">
        </div>
        <div class="editor-field">
          <label>Nota</label>
          <input type="text" class="editor-input" id="ed-new-note" placeholder="Nombre libre">
        </div>
      </div>
      <button class="btn" onclick="editorAddPos()">+ Añadir posición</button>`;

    // Footer buttons
    const dis = editorState.loading ? "disabled" : "";
    const footer = `
      <button class="btn" onclick="editorClose()">Cancelar</button>
      <button class="btn primary" onclick="editorSave(false)" ${dis}>
        ${editorState.loading ? "Guardando…" : "Guardar"}</button>
      <button class="btn primary" onclick="editorSave(true)" ${dis}
              title="Guardar y lanzar pipeline para actualizar el dashboard">
        ${editorState.loading ? "…" : "Guardar + Actualizar"}</button>`;

    root.innerHTML = editorModalShell(body, footer);
  }

  function editorModalShell(bodyHtml, footerHtml) {
    const hasToken = !!editorGetToken();
    const disc = hasToken
      ? `<button class="btn small danger" onclick="editorDisconnect()" title="Borrar token">Desconectar</button>`
      : "";
    const footer = footerHtml
      ? `<div class="modal-footer">${footerHtml}</div>`
      : `<div class="modal-footer"><button class="btn" onclick="editorClose()">Cerrar</button></div>`;

    return `
      <div class="modal-overlay" onclick="if(event.target===this)editorClose()">
        <div class="modal">
          <div class="modal-header">
            <h2>Gestionar Cartera</h2>
            <div style="display:flex;gap:8px;">${disc}<button class="btn small" onclick="editorClose()">✕</button></div>
          </div>
          <div class="modal-body">${bodyHtml}</div>
          ${footer}
        </div>
      </div>`;
  }

  function editorRenderTokenSetup() {
    return `
      <div style="text-align:center;padding:8px 0;">
        <div style="font-size:28px;margin-bottom:12px;">🔑</div>
        <div style="font-weight:700;margin-bottom:8px;">Configurar acceso a GitHub</div>
        <div style="color:var(--text-secondary);font-size:13px;margin-bottom:16px;">
          Necesitas un <strong>Personal Access Token</strong> de GitHub con permiso
          <code style="background:var(--bg-base);padding:2px 4px;border-radius:3px;">contents:write</code>
          en el repo <code style="background:var(--bg-base);padding:2px 4px;border-radius:3px;">${escapeHtml(GITHUB_REPO)}</code>.
        </div>
        <div class="editor-field" style="text-align:left;">
          <label>Personal Access Token</label>
          <input type="password" class="editor-input" id="ed-token" placeholder="ghp_xxxxxxxxxxxx">
        </div>
        <div style="display:flex;gap:8px;justify-content:center;">
          <button class="btn" onclick="editorClose()">Cancelar</button>
          <button class="btn primary" onclick="editorSaveToken()">Conectar</button>
        </div>
        <div style="color:var(--text-muted);font-size:11px;margin-top:12px;">
          El token se guarda solo en tu navegador (localStorage). No se envía a ningún servidor propio.
        </div>
      </div>`;
  }

  /* ---------- Editor actions ---------- */

  function editorSaveToken() {
    const t = document.getElementById("ed-token")?.value?.trim();
    if (!t) return;
    editorSetToken(t);
    editorOpen();
  }

  function editorDeletePos(index) {
    if (!editorState.portfolio) return;
    const pos = editorState.portfolio.positions[index];
    if (!confirm(`¿Eliminar ${pos.ticker} de la cartera?`)) return;
    editorState.portfolio.positions.splice(index, 1);
    editorState.dirty = true;
    editorRender();
  }

  function editorUpdatePos(index, field, value) {
    if (!editorState.portfolio) return;
    const pos = editorState.portfolio.positions[index];
    if (field === "precio_compra") {
      pos[field] = parseFloat(value);
    } else {
      if (value) pos[field] = value;
      else delete pos[field];
    }
    editorState.dirty = true;
  }

  function editorTogglePartial(index, level) {
    if (!editorState.portfolio) return;
    const pos = editorState.portfolio.positions[index];
    if (!pos.partials_done) pos.partials_done = [];

    if (pos.partials_done.includes(level)) {
      pos.partials_done = pos.partials_done.filter((p) => p !== level);
      if (level === "2R") pos.partials_done = pos.partials_done.filter((p) => p !== "3R");
    } else {
      if (level === "3R" && !pos.partials_done.includes("2R")) pos.partials_done.push("2R");
      pos.partials_done.push(level);
    }
    if (!pos.partials_done.length) delete pos.partials_done;

    editorState.dirty = true;
    editorRender();
  }

  function editorAddPos() {
    if (!editorState.portfolio) return;
    const ticker = document.getElementById("ed-new-ticker")?.value?.trim().toUpperCase();
    const price  = parseFloat(document.getElementById("ed-new-price")?.value);
    const date   = document.getElementById("ed-new-date")?.value || undefined;
    const note   = document.getElementById("ed-new-note")?.value?.trim() || undefined;

    if (!ticker || !price || isNaN(price)) {
      alert("Ticker y precio de compra son obligatorios.");
      return;
    }
    if (editorState.portfolio.positions.some((p) => p.ticker === ticker)) {
      alert(`${ticker} ya está en la cartera.`);
      return;
    }

    const pos = { ticker, precio_compra: price };
    if (date) pos.fecha_compra = date;
    if (note) pos.note = note;

    editorState.portfolio.positions.push(pos);
    editorState.dirty = true;
    editorRender();
  }

  async function editorSave(triggerUpdate) {
    if (!editorState.portfolio || !editorState.sha) return;

    const capInput = document.getElementById("ed-capital");
    if (capInput) {
      const v = parseFloat(capInput.value);
      if (v > 0) editorState.portfolio.capital_total = v;
    }

    editorState.loading = true;
    editorState.status = { type: "loading", msg: "Guardando en GitHub…" };
    editorRender();

    try {
      editorState.sha = await editorSavePortfolio(editorState.portfolio, editorState.sha);
      editorState.dirty = false;

      if (triggerUpdate) {
        editorState.status = { type: "loading", msg: "Guardado. Lanzando pipeline…" };
        editorRender();
        await editorTriggerWorkflow();
        editorState.status = { type: "ok", msg: "Guardado y pipeline lanzado. El dashboard se actualizará en ~5 min." };
      } else {
        editorState.status = { type: "ok", msg: "Guardado. Lanza el pipeline manualmente o pulsa Guardar + Actualizar la próxima vez." };
      }
    } catch (err) {
      editorState.status = { type: "err", msg: `Error: ${err.message}` };
    }

    editorState.loading = false;
    editorRender();
  }

  /* ============================================================ */

  bootstrap();

  // Auto-refresh cada 5 min para que timeAgo() y banners se mantengan vivos
  setInterval(bootstrap, 5 * 60 * 1000);
  </script>

</body>
</html>
