name: ASP-B Telegram Semanal

on:
  # Cada sabado a las 6:00 UTC = 8:00 hora Espana (verano CEST +2)
  schedule:
    - cron: "0 6 * * 6"

  # Boton manual para enviar cuando quieras
  workflow_dispatch:

jobs:
  send-telegram:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar screener y enviar Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PYTHONIOENCODING: utf-8
        run: python aspb_telegram.py
