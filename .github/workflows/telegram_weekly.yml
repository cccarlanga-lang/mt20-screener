name: ASP-B Telegram Semanal

on:
  # Cada sabado a las 6:00 UTC = 8:00 hora Espana (verano CEST +2)
  schedule:
    - cron: "0 6 * * 6"

  # Boton manual para enviar cuando quieras
  workflow_dispatch:

permissions:
  contents: write   # necesario para hacer push del dashboard

jobs:
  send-telegram:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar screener, generar dashboard y enviar Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PYTHONIOENCODING: utf-8
        run: python aspb_telegram.py

      - name: Publicar dashboard en GitHub Pages
        run: |
          git config user.name "ASP-B Bot"
          git config user.email "aspb-bot@github-actions"
          git add docs/aspb.html
          git diff --staged --quiet || git commit -m "dashboard: ASP-B screener $(date +%Y-%m-%d) [skip ci]"
          git push
