name: Update Dashboard

on:
  schedule:
    - cron: "0 21 * * 5"   # Viernes 21:00 UTC (22:00 CET / 23:00 CEST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly engine
        run: python emit_signals_auto.py

      - name: Generate dashboard data
        env:
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python generate_dashboard_data.py --verbose

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals_auto.json docs/data.json docs/update_status.json
          if git diff --cached --quiet; then
            echo "Sin cambios."
          else
            git commit -m "chore(dashboard): weekly data refresh ($(date -u +%Y-%m-%d))"
            git push
          fi
