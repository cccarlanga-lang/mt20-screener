name: Update MT2.0 Dashboard

on:
  # Auto: cada sabado a las 01:00 UTC (03:00 Madrid verano, 02:00 invierno)
  # Esto es ~3h despues del cierre del viernes en US
  schedule:
    - cron: '0 1 * * 6'

  # Manual: boton "Run workflow" en GitHub Actions
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard
        run: python generate_dashboard.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add docs/
          # Solo commit si hay cambios
          if git diff --staged --quiet; then
            echo "Sin cambios, nada que commitear"
          else
            git commit -m "Update dashboard $(date -u +%Y-%m-%d)"
            git push
          fi
